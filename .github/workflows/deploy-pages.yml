name: Build and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BUILD_DIR: dist

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Derive base URL for GitHub Pages
        id: base
        run: |
          owner_repo="${GITHUB_REPOSITORY}"
          repo_name="${owner_repo#*/}"
          owner_name="${owner_repo%%/*}"

          if [ "${repo_name}" = "${owner_name}.github.io" ]; then
            base_path="/"
          else
            base_path="/${repo_name}/"
          fi

          echo "base_path=${base_path}" >> "${GITHUB_OUTPUT}"

      - name: Build static artifact
        env:
          BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: |
          mkdir -p "${BUILD_DIR}"

          cp -R assets content scripts styles "${BUILD_DIR}/"
          cp index.html "${BUILD_DIR}/"

          python3 - <<'PY'
          from pathlib import Path
          import os

          build_dir = Path(os.environ['BUILD_DIR'])
          base_path = os.environ.get('BASE_PATH', '/').strip()

          if not base_path.startswith('/'):
              base_path = '/' + base_path
          if not base_path.endswith('/'):
              base_path += '/'

          index_path = build_dir / 'index.html'
          html = index_path.read_text(encoding='utf-8')

          if '<base ' in html:
              raise SystemExit('index.html already contains a <base> tag; aborting base injection.')

          base_tag = f'    <base href="{base_path}" />\n'
          html = html.replace('  <head>\n', '  <head>\n' + base_tag, 1)
          index_path.write_text(html, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
